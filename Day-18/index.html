<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <section id="ex01" class="card">
      <h3>Bài 1: Hiện thị n số fibonacci đầu tiên</h3>
      <div class="form-group">
        <label>Nhập n</label>
        <input type="number" id="b1_number" placeholder="....." />
      </div>
      <button type="button" class="btn btn-1">bấm</button>
      <p class="result" id="b1_result"></p>
    </section>
    <section id="ex02" class="card">
      <h3>Bài 2: Đảo ngược số</h3>
      <div class="form-group">
        <label>Nhập n</label>
        <input type="number" id="b2_number" placeholder="....." />
      </div>
      <button type="button" class="btn btn-2">bấm</button>
      <p class="result" id="b2_result"></p>
    </section>
    <section id="ex03" class="card">
      <h3>Bài 3: Hàm chuyển số thành chữ</h3>
      <div class="form-group">
        <label>Nhập n</label>
        <input
          type="number"
          id="b3_number"
          placeholder="....."
          min="0"
          max="9999"
        />
      </div>
      <button type="button" class="btn btn-3">bấm</button>
      <p class="result" id="b3_result"></p>
    </section>
    <script src="js/ex.js"></script>
  </body>
</html>
