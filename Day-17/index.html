<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập về nhà Js</title>
    <link rel="stylesheet" href="../Day-17/css/homework.css" />
  </head>
  <body>
    <h1 style="text-align: center; margin-bottom: 40px">
      Bài tập về nhà ngày 17
    </h1>

    <main>
      <section id="ex01" class="card">
        <h3>Bài 1: Hoán vị 2 số</h3>

        <div class="form-group">
          <label for="b1_a">Số A</label>
          <input type="number" id="b1_a" placeholder="Nhập số A..." />
        </div>

        <div class="form-group">
          <label for="b1_b">Số B</label>
          <input type="number" id="b1_b" placeholder="Nhập số B..." />
        </div>

        <button type="button" class="btn btn-1">Hoán vị</button>
        <p class="result" id="b1_result"></p>
      </section>
      <section id="ex02" class="card">
        <h3>Bài 2: Tìm số lớn nhất</h3>
        <div class="form-group">
          <label for="b2_a">Số A</label>
          <input type="number" id="b2_a" placeholder="Nhập số A..." />
        </div>

        <div class="form-group">
          <label for="b2_b">Số B</label>
          <input type="number" id="b2_b" placeholder="Nhập số B..." />
        </div>

        <div class="form-group">
          <label for="b2_c">Số C</label>
          <input type="number" id="b2_c" placeholder="Nhập số C..." />
        </div>

        <button type="button" class="btn btn-2">Action</button>
        <p class="result" id="b2_result"></p>
      </section>

      <section id="ex03" class="card">
        <h3>Bài 3: kiểm tra số cùng dấu</h3>

        <div class="form-group">
          <label for="b3_a">Số A</label>
          <input type="number" id="b3_a" placeholder="Nhập số A..." />
        </div>

        <div class="form-group">
          <label for="b3_b">Số B</label>
          <input type="number" id="b3_b" placeholder="Nhập số B..." />
        </div>

        <button type="button" class="btn btn-3">Check</button>
        <p class="result" id="b3_result"></p>
      </section>

      <section id="ex04" class="card">
        <h3>Bài 4: Sắp xếp ba số</h3>
        <div class="form-group">
          <label for="b4_a">Số A</label>
          <input type="number" id="b4_a" placeholder="Nhập số A..." />
        </div>

        <div class="form-group">
          <label for="b4_b">Số B</label>
          <input type="number" id="b4_b" placeholder="Nhập số B..." />
        </div>

        <div class="form-group">
          <label for="b4_c">Số C</label>
          <input type="number" id="b4_c" placeholder="Nhập số C..." />
        </div>

        <button type="button" class="btn btn-4">Action</button>
        <p class="result" id="b4_result"></p>
      </section>

      <section id="ex05" class="card">
        <h3>Bài 5: Tính tiền taxi</h3>
        <div class="form-group">
          <input
            type="number"
            id="numberKm"
            placeholder="Nhập số tiền taxi..."
          />
        </div>
        <button class="btn btn-5">Action</button>
        <p class="result" id="b5_result"></p>
      </section>

      <section id="ex06" class="card">
        <h3>Bài 6: Tính tiền điện</h3>
        <div class="form-group">
          <label for="b6_kwh">Số kWh tiêu thụ</label>
          <input type="number" id="b6_kwh" placeholder="Nhập số điện..." />
        </div>

        <button type="button" class="btn btn-6">Tính tiền điện</button>
        <p class="result" id="b6_result"></p>
      </section>
      <section id="ex07" class="card">
        <h3>Bài 7: Tính giá trị biểu thức</h3>
        <pre>S = 1*2 + 2*3 + 3*4 + ... + n*(n+1)</pre>
        <div class="form-group">
          <label>Nhập n</label>
          <input type="number" id="b7_number" placeholder="..." />
        </div>
        <button type="button" class="btn btn-7">Tính tổng</button>
        <p class="result" id="b7_result"></p>
      </section>

      <section id="ex08" class="card">
        <h3>Bài 8: Kiểm tra số nguyên tố</h3>
        <div class="form-group">
          <label>Nhập n</label>
          <input type="number" id="b8_number" placeholder="....." />
        </div>
        <button type="button" class="btn btn-8">Bấm</button>
        <p class="result" id="b8_result"></p>
      </section>

      <section id="ex09" class="card">
        <h3>Bài 9: Vẽ bảng cửu chương</h3>
        <div class="form-group">
          <label>Nhập n</label>
          <input type="number" id="b9_number" placeholder="....." />
        </div>
        <button type="button" class="btn btn-9">bấm</button>
        <p class="result" id="b9_result"></p>
      </section>
    </main>

    <script src="js/homework.js"></script>
  </body>
</html>
